# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - clinic-website-v1-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone package
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d "public" ]; then
            cp -r public .next/standalone/public
          fi

      - name: Zip standalone for deployment
        # zip -r includes hidden directories (like .next) — critical for Next.js standalone
        run: cd .next/standalone && zip -r ../../deploy.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CB7B8D93DC0C4F81902E22CC3CAECCE9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9E5AA56188004C0B8D958098C429261E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_55292AAAF9DB4CCEAE127092D9FC2F24 }}

      - name: Configure Azure Web App settings
        run: |
          az webapp config appsettings set \
            --name clinic-website-v1-web \
            --resource-group clinic-website-v1 \
            --settings \
              HOSTNAME=0.0.0.0 \
              PORT=8080 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              WEBSITE_NODE_DEFAULT_VERSION=~20 \
              COSMOS_ENDPOINT="${{ secrets.COSMOS_ENDPOINT }}" \
              COSMOS_KEY="${{ secrets.COSMOS_KEY }}" \
              COSMOS_DATABASE="clinic" \
              COSMOS_CONTAINER="appointments" \
              ADMIN_API_KEY="${{ secrets.ADMIN_API_KEY }}"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "clinic-website-v1-web"
          slot-name: "Production"
          package: deploy.zip
          startup-command: "node server.js"
